version: "3"
services:
  #PHP Service
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php-desafio-01-uri
    restart: unless-stopped
    command: bash -c "composer install && php-fpm"
    working_dir: /var/www
    volumes:
      - ./src/:/var/www
    networks:
      - app-network

  #Nginx Service
  nginx:
    image: nginx:alpine
    container_name: nginx-desafio-01-uri
    restart: unless-stopped
    tty: true
    ports:
      - "1010:80"
      - "10101:443"
    volumes:
      - ./src/:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    depends_on:
      - php
    networks:
      - app-network

#Docker Networks
networks:
  app-network:
    driver: bridge
